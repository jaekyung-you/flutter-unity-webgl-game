<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Tap Runner</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #unity-canvas { width: 100%; height: 100%; display: block; }
      #unity-loading-bar {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; color: #fff; font-family: sans-serif;
      }
      #unity-progress-bar-empty {
        width: 200px; height: 10px; background: #333; border-radius: 5px; margin-top: 10px;
      }
      #unity-progress-bar-full {
        width: 0; height: 100%; background: #4fc3f7; border-radius: 5px; transition: width 0.2s;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div>Loading...</div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "TapRunner",
        productVersion: "1.0",
      };

      // Expose unityInstance globally so Flutter can call SendMessage
      window.unityInstance = null;

      // Flutter → Unity commands
      window.flutterStartGame = function() {
        if (window.unityInstance) {
          window.unityInstance.SendMessage('GameManager', 'OnFlutterStartGame', '');
        }
      };
      window.flutterRestartGame = function() {
        if (window.unityInstance) {
          window.unityInstance.SendMessage('GameManager', 'OnFlutterRestartGame', '');
        }
      };

      function showError(msg) {
        document.querySelector("#unity-loading-bar").innerHTML =
          '<div style="color:red;padding:20px;font-size:14px;max-width:300px;word-break:break-all;">ERROR:<br>' + msg + '</div>';
        console.error("[TapRunner] " + msg);
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onerror = function() { showError("Failed to load " + loaderUrl); };
      script.onload = function() {
        console.log("[TapRunner] loader.js loaded, creating Unity instance...");
        createUnityInstance(document.querySelector("#unity-canvas"), config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
          console.log("[TapRunner] progress: " + Math.round(progress * 100) + "%");
        }).then(function(instance) {
          window.unityInstance = instance;
          document.querySelector("#unity-loading-bar").style.display = "none";
          console.log("[TapRunner] Unity ready!");
          if (window.flutter_inappwebview) {
            window.flutter_inappwebview.callHandler('onUnityReady');
          }
        }).catch(function(message) {
          showError(String(message));
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
