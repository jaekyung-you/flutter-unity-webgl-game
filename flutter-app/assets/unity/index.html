<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>칼퇴왕</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #unity-canvas { width: 100%; height: 100%; display: block; }
      #unity-loading-bar { display: none; }
      #custom-loading {
        position: fixed; inset: 0; z-index: 100;
        background: #0A0A1E;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: -apple-system, 'Pretendard', sans-serif;
        transition: opacity 0.4s ease;
      }
      #custom-loading.fade-out { opacity: 0; pointer-events: none; }
      #custom-loading .icon-box {
        width: 88px; height: 88px; border-radius: 20px;
        background: #FFCC00;
        display: flex; align-items: center; justify-content: center;
        font-size: 44px; line-height: 1;
        box-shadow: 0 0 32px rgba(255,204,0,0.5);
        margin-bottom: 20px;
      }
      #custom-loading .title {
        font-size: 13px; font-weight: 700; letter-spacing: 4px;
        color: #FFCC00; margin-bottom: 6px;
      }
      #custom-loading .subtitle {
        font-size: 22px; font-weight: 800;
        color: #fff; margin-bottom: 40px;
      }
      #custom-loading .bar-wrap {
        width: 200px; height: 4px; background: rgba(255,255,255,0.12);
        border-radius: 2px; overflow: hidden; margin-bottom: 10px;
      }
      #custom-loading .bar-fill {
        height: 100%; width: 0; background: #FFCC00;
        border-radius: 2px; transition: width 0.2s;
      }
      #custom-loading .loading-text {
        font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.3);
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar"></div>
    <div id="custom-loading">
      <div class="icon-box">💼</div>
      <div class="title">OVERWORK DODGE</div>
      <div class="subtitle">칼퇴왕</div>
      <div class="bar-wrap">
        <div class="bar-fill" id="cl-bar"></div>
      </div>
      <div class="loading-text">LOADING...</div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "KalToeWang",
        productVersion: "1.0",
      };

      // --- Browser-mode overlay (shown when running outside Flutter WebView) ---
      var overlay = document.createElement('div');
      overlay.style.cssText = [
        'display:none', 'position:fixed', 'inset:0',
        'background:rgba(0,0,0,0.6)', 'color:#fff',
        'font-family:sans-serif', 'flex-direction:column',
        'align-items:center', 'justify-content:center', 'z-index:99'
      ].join(';');
      overlay.innerHTML =
        '<h1 id="ov-title" style="font-size:2.5rem;letter-spacing:.2em;margin:0">칼퇴왕</h1>' +
        '<p id="ov-sub" style="margin:.5rem 0 2rem;color:#ccc">← → 키 또는 A/D 로 피하세요</p>' +
        '<div id="ov-scores" style="display:none;font-size:1.3rem;margin-bottom:1.5rem">' +
          '<span id="ov-score"></span>&nbsp;|&nbsp;<span id="ov-best" style="color:#ffd54f"></span>' +
        '</div>' +
        '<button id="ov-btn" style="padding:.8rem 3rem;font-size:1.3rem;border:none;border-radius:8px;background:#2196f3;color:#fff;cursor:pointer">START</button>';
      document.body.appendChild(overlay);

      window.unityInstance = null;
      var isBrowserMode = !window.flutter_inappwebview;

      window.flutterStartGame = function() {
        if (window.unityInstance)
          window.unityInstance.SendMessage('GameManager', 'OnFlutterStartGame', '');
      };
      window.flutterSetCharacter = function(charName) {
        if (window.unityInstance)
          window.unityInstance.SendMessage('GameManager', 'OnFlutterSetCharacter', charName);
      };
      window.flutterRestartGame = function() {
        if (window.unityInstance)
          window.unityInstance.SendMessage('GameManager', 'OnFlutterRestartGame', '');
      };
      window.flutterMoveLeft = function() {
        if (window.unityInstance)
          window.unityInstance.SendMessage('Player', 'OnFlutterMoveLeft', '');
      };
      window.flutterMoveRight = function() {
        if (window.unityInstance)
          window.unityInstance.SendMessage('Player', 'OnFlutterMoveRight', '');
      };
      window.flutterStopMove = function() {
        if (window.unityInstance)
          window.unityInstance.SendMessage('Player', 'OnFlutterStopMove', '');
      };
      window.flutterPause = function() {
        if (window.unityInstance)
          window.unityInstance.SendMessage('GameManager', 'OnFlutterPause', '');
      };

      // Fallback bridge for browser mode
      window.flutter_inappwebview = window.flutter_inappwebview || {
        callHandler: function(name, a, b) {
          if (name === 'onGameOver') showOverlay('gameover', a, b);
        }
      };

      var bestScoreBrowser = 0;
      function showOverlay(mode, score, best) {
        overlay.style.display = 'flex';
        var title  = document.getElementById('ov-title');
        var sub    = document.getElementById('ov-sub');
        var scores = document.getElementById('ov-scores');
        var btn    = document.getElementById('ov-btn');
        if (mode === 'start') {
          title.textContent = '칼퇴왕';
          sub.style.display = 'block';
          scores.style.display = 'none';
          btn.textContent = 'START';
          btn.style.background = '#2196f3';
          btn.onclick = function() {
            overlay.style.display = 'none';
            window.flutterStartGame();
            canvas.focus();
          };
        } else {
          if (best > bestScoreBrowser) bestScoreBrowser = best;
          title.textContent = 'GAME OVER';
          sub.style.display = 'none';
          scores.style.display = 'block';
          document.getElementById('ov-score').textContent = 'Score: ' + (score || 0) + 's';
          document.getElementById('ov-best').textContent  = 'Best: '  + bestScoreBrowser + 's';
          btn.textContent = 'RESTART';
          btn.style.background = '#ff9800';
          btn.onclick = function() {
            overlay.style.display = 'none';
            window.flutterRestartGame();
            canvas.focus();
          };
        }
      }

      function showError(msg) {
        clOverlay.innerHTML =
          '<div style="color:#E53935;padding:20px;font-size:14px;max-width:300px;text-align:center;word-break:break-all;">로딩 실패<br><span style="color:rgba(255,255,255,0.5);font-size:12px">' + msg + '</span></div>';
        console.error("[KalToeWang] " + msg);
      }

      var clBar = document.getElementById('cl-bar');
      var clOverlay = document.getElementById('custom-loading');
      function hideCustomLoading() {
        clOverlay.classList.add('fade-out');
        setTimeout(function() { clOverlay.style.display = 'none'; }, 450);
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onerror = function() { showError("Failed to load " + loaderUrl); };
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          clBar.style.width = (100 * progress) + "%";
          console.log("[KalToeWang] " + Math.round(progress * 100) + "%");
        }).then(function(instance) {
          window.unityInstance = instance;
          hideCustomLoading();
          if (isBrowserMode) {
            showOverlay('start');
          } else {
            window.flutter_inappwebview.callHandler('onUnityReady');
          }
        }).catch(function(message) {
          showError(String(message));
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
